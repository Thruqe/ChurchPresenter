name: Multi-platform Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GTK4 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev build-essential pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Upload Linux Binary
        uses: actions/upload-artifact@v4
        with:
          name: church-presenter-linux
          path: target/release/gtk-app

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust GNU toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-gnu

      - name: Setup MSYS2 and GTK4
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gcc

      - name: Build release binary
        shell: msys2 {0}
        run: cargo build --release

      - name: Upload Windows Binary
        uses: actions/upload-artifact@v4
        with:
          name: church-presenter-windows
          path: target/release/gtk-app.exe

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GTK4 dependencies
        run: brew install gtk4 pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Upload macOS Binary
        uses: actions/upload-artifact@v4
        with:
          name: church-presenter-macos
          path: target/release/gtk-app
