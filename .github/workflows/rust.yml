name: Multi-platform Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build for Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GTK4 and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev build-essential pkg-config rpm \
            imagemagick librsvg2-bin

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Build Linux Installer
        run: |
          VERSION=$(sed -n 's/^version *= *["\x27]\([^"\x27\\]*\)["\x27]/\1/p' version.toml)
          ./metadata/bundle_linux.sh "$VERSION"

      - name: Upload Linux Installer
        uses: actions/upload-artifact@v4
        with:
          name: church-presenter-linux-installer
          path: |
            church-presenter-setup.deb
            church-presenter-setup.rpm

  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust GNU toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable-x86_64-pc-windows-gnu

      - name: Setup MSYS2 and GTK4
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          path-type: inherit
          install: >-
            mingw-w64-x86_64-gtk4
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-gcc

      - name: Install NDI Runtime (Windows)
        shell: powershell
        run: |
          # Use the NDI Runtime installer — smaller than the full SDK and all we
          # need is Processing.NDI.Lib.x64.dll to bundle with the application.
          # The installer is InnoSetup-based so we MUST use InnoSetup silent flags
          # (/VERYSILENT /SUPPRESSMSGBOXES /NORESTART) — NOT the NSIS /S flag.
          $ndiInstallerUrl = "https://downloads.ndi.tv/SDK/NDI_SDK/NDI%206%20Runtime.exe"
          $ndiInstaller = "$env:TEMP\NDI_Runtime_installer.exe"

          # Temporarily exclude the temp dir from Defender to prevent scan stalls
          Add-MpPreference -ExclusionPath $env:TEMP -ErrorAction SilentlyContinue

          Write-Host "Downloading NDI Runtime installer..."
          Invoke-WebRequest -Uri $ndiInstallerUrl -OutFile $ndiInstaller -UseBasicParsing
          Write-Host "Download complete. Running silent install..."

          # InnoSetup silent flags — /VERYSILENT suppresses all UI, including EULA
          $proc = Start-Process -FilePath $ndiInstaller `
                                -ArgumentList "/VERYSILENT", "/SUPPRESSMSGBOXES", "/NORESTART" `
                                -PassThru -NoNewWindow
          # Guard with a 3-minute timeout so the job doesn't hang forever
          if (-not $proc.WaitForExit(180000)) {
            $proc.Kill()
            Write-Error "NDI Runtime installer timed out after 3 minutes."
            exit 1
          }
          Write-Host "Installer exited with code: $($proc.ExitCode)"

          # Locate the DLL — path varies slightly by SDK version
          $ndiDll = Get-ChildItem -Path "C:\Program Files\NDI" `
                                  -Filter "Processing.NDI.Lib.x64.dll" `
                                  -Recurse -ErrorAction SilentlyContinue |
                    Select-Object -First 1
          if ($ndiDll) {
            Write-Host "NDI DLL ready at: $($ndiDll.FullName)"
          } else {
            Write-Error "Processing.NDI.Lib.x64.dll not found after installation!"
            exit 1
          }

      - name: Build release binary
        shell: msys2 {0}
        run: cargo build --release

      - name: Bundle Windows files
        shell: msys2 {0}
        run: ./metadata/bundle_windows.sh

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup -y
          # Make ISCC available on PATH for subsequent bash steps
          Add-Content $env:GITHUB_PATH "C:\Program Files (x86)\Inno Setup 6"

      - name: Compile Windows Installer (Inno Setup)
        shell: bash
        run: |
          VERSION=$(sed -n "s/^version *= *[\"']\([^\"'\\]*\)[\"']/\1/p" version.toml)
          ISCC //DMyAppVersion="$VERSION" metadata/installer.iss

      - name: Sign Executable and Installer (Windows)
        shell: powershell
        env:
          SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        run: |
          if ($env:SIGNING_CERT_BASE64) {
            $certBytes = [System.Convert]::FromBase64String($env:SIGNING_CERT_BASE64)
            [System.IO.File]::WriteAllBytes("cert.pfx", $certBytes)
            $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Filter signtool.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($signtool) {
              # Sign binary inside bundle first
              & $signtool.FullName sign /f cert.pfx /p $env:SIGNING_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 dist-windows-bundle\church-presenter.exe
              # Recompile installer with signed binary (Inno Setup)
              $version = (Get-Content version.toml | Select-String -Pattern 'version\s*=\s*"(.*)"') -replace 'version\s*=\s*"(.*)"', '$1'
              ISCC /DMyAppVersion=$version metadata/installer.iss
              # Sign the final setup installer
              & $signtool.FullName sign /f cert.pfx /p $env:SIGNING_CERT_PASSWORD /tr http://timestamp.digicert.com /td sha256 /fd sha256 church-presenter-setup.exe
            } else {
              Write-Warning "signtool.exe not found. Skipping signature step."
            }
            Remove-Item cert.pfx -ErrorAction SilentlyContinue
          } else {
            Write-Output "No signing certificate secret found. Skipping signing step."
          }

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: church-presenter-windows-installer
          path: church-presenter-setup.exe

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install GTK4 dependencies
        run: brew install gtk4 pkg-config

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Create macOS App Bundle and DMG
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.MACOS_NOTARIZATION_APPLE_ID }}
          MACOS_NOTARIZATION_PASSWORD: ${{ secrets.MACOS_NOTARIZATION_PASSWORD }}
          MACOS_TEAM_ID: ${{ secrets.MACOS_TEAM_ID }}
        run: |
          VERSION=$(sed -n 's/^version *= *["\x27]\([^"\x27\\]*\)["\x27]/\1/p' version.toml)
          ./metadata/bundle_macos.sh "$VERSION"

      - name: Upload macOS Installer
        uses: actions/upload-artifact@v4
        with:
          name: church-presenter-macos-installer
          path: church-presenter-setup.dmg

  release:
    name: Create Tag and Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version and create tag
        run: |
          VERSION=$(sed -n 's/^version *= *["\x27]\([^"\x27\\]*\)["\x27]/\1/p' version.toml)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          git fetch --tags
          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "TAG_EXISTS=true" >> $GITHUB_ENV
            echo "Tag v$VERSION already exists. Skipping release."
          else
            echo "TAG_EXISTS=false" >> $GITHUB_ENV
            echo "Tag v$VERSION does not exist. Creating..."
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

      - name: Download Linux installer
        if: env.TAG_EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          name: church-presenter-linux-installer
          path: ./dist-linux

      - name: Download Windows installer
        if: env.TAG_EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          name: church-presenter-windows-installer
          path: ./dist-windows

      - name: Download macOS installer
        if: env.TAG_EXISTS == 'false'
        uses: actions/download-artifact@v4
        with:
          name: church-presenter-macos-installer
          path: ./dist-macos

      - name: Prepare Release Assets
        if: env.TAG_EXISTS == 'false'
        run: |
          mkdir -p ./release-assets
          cp ./dist-linux/church-presenter-setup.deb  ./release-assets/church-presenter-linux-amd64.deb
          cp ./dist-linux/church-presenter-setup.rpm  ./release-assets/church-presenter-linux-amd64.rpm
          cp ./dist-windows/church-presenter-setup.exe ./release-assets/church-presenter-windows-amd64-setup.exe
          cp ./dist-macos/church-presenter-setup.dmg  ./release-assets/church-presenter-macos-amd64.dmg

      - name: Create Release
        if: env.TAG_EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          body: |
            Automated release for version v${{ env.VERSION }}.

            Installers for all supported platforms are attached below.

            **What's included:**
            - All required runtime DLLs / shared libraries (GTK4, NDI, etc.)
            - No separate NDI SDK installation required on end-user machines
            - Full icon coverage across OS contexts (taskbar, launcher, file manager, Alt+Tab)
          files: |
            ./release-assets/church-presenter-linux-amd64.deb
            ./release-assets/church-presenter-linux-amd64.rpm
            ./release-assets/church-presenter-windows-amd64-setup.exe
            ./release-assets/church-presenter-macos-amd64.dmg
