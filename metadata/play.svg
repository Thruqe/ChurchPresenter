<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background: near-black with very subtle dark-teal tint -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#0a1f2e"/>
      <stop offset="60%"  stop-color="#070e14"/>
      <stop offset="100%" stop-color="#040a10"/>
    </radialGradient>

    <!-- Screen border glow: cyan → blue -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#2979ff"/>
    </linearGradient>

    <!-- Screen inner surface: dark with subtle teal center -->
    <radialGradient id="screenInner" cx="40%" cy="50%" r="55%">
      <stop offset="0%"   stop-color="#0d2233"/>
      <stop offset="100%" stop-color="#060d13"/>
    </radialGradient>

    <!-- Broadcast arc gradient: bright cyan → indigo -->
    <linearGradient id="arcGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#651fff" stop-opacity="0.5"/>
    </linearGradient>

    <!-- Glow filter for the screen border -->
    <filter id="borderGlow" x="-8%" y="-8%" width="116%" height="116%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glow filter for broadcast arcs -->
    <filter id="arcGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow for the play triangle -->
    <filter id="playGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Top rim highlight -->
    <linearGradient id="rimHighlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Clip path for rounded square -->
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="104" ry="104"/>
    </clipPath>
  </defs>

  <!-- ── Background ────────────────────────────────────────────────────── -->
  <rect width="512" height="512" rx="104" ry="104" fill="url(#bgGlow)"/>
  <!-- Top glass rim -->
  <rect width="512" height="200" rx="104" ry="104" fill="url(#rimHighlight)"/>

  <!-- ── Screen outer glow ring (blurred copy of border) ──────────────── -->
  <rect x="58" y="118" width="396" height="248" rx="22" ry="22"
        fill="none"
        stroke="url(#borderGrad)" stroke-width="10"
        filter="url(#borderGlow)" opacity="0.65"/>

  <!-- ── Screen panel ──────────────────────────────────────────────────── -->
  <!-- Inner surface -->
  <rect x="64" y="124" width="384" height="236" rx="18" ry="18"
        fill="url(#screenInner)"/>
  <!-- Crisp border on top of the surface -->
  <rect x="64" y="124" width="384" height="236" rx="18" ry="18"
        fill="none"
        stroke="url(#borderGrad)" stroke-width="3.5"
        filter="url(#borderGlow)"/>

  <!-- ── Broadcast arcs (right side of play button) ───────────────────── -->
  <!-- Origin point: tip of play triangle ≈ x=296, y=242 -->
  <g filter="url(#arcGlow)" fill="none" stroke="url(#arcGrad)" stroke-linecap="round">
    <!-- Small arc -->
    <path d="M 300 213 A 30 30 0 0 1 300 271"  stroke-width="7"  opacity="0.95"/>
    <!-- Medium arc -->
    <path d="M 308 196 A 50 50 0 0 1 308 288"  stroke-width="5.5" opacity="0.75"/>
    <!-- Large arc -->
    <path d="M 318 178 A 70 70 0 0 1 318 306"  stroke-width="4"  opacity="0.50"/>
  </g>

  <!-- ── Play triangle ─────────────────────────────────────────────────── -->
  <!-- Glow shadow layer -->
  <polygon points="152,196 296,242 152,288"
           fill="#00c8ff" opacity="0.25" filter="url(#playGlow)"/>
  <!-- Main white triangle -->
  <polygon points="158,200 292,242 158,284"
           fill="#ffffff"/>

  <!-- ── Lyrics / text lines at the bottom of the screen ──────────────── -->
  <rect x="100" y="330" width="240" height="10" rx="5" fill="#ffffff" opacity="0.55"/>
  <rect x="100" y="348" width="180" height="10" rx="5" fill="#ffffff" opacity="0.35"/>

  <!-- ── Screen stand / base (below the screen) ───────────────────────── -->
  <rect x="232" y="360" width="48" height="14" rx="4" fill="#0d2233" opacity="0.0"/>

  <!-- ── Bottom connector dots (NDI / broadcast indicator) ────────────── -->
  <circle cx="456" cy="340" r="6" fill="#00e5ff" opacity="0.80"/>
  <circle cx="456" cy="340" r="12" fill="#00e5ff" opacity="0.18"/>
  <circle cx="456" cy="340" r="20" fill="#00e5ff" opacity="0.07"/>
</svg>
